<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ankieta UX: Gmail vs Outlook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="container">
    <header class="hero">
      <p class="eyebrow">Badanie interakcji</p>
      <h1>Gmail vs Outlook</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="survey">Ankieta</button>
        <button class="tab" data-tab="analysis">Analiza</button>
      </nav>
    </header>

    <!-- Survey tab -->
    <section id="tab-survey" class="tab-content active">
      <section class="card">
        <h2>Dane respondenta</h2>
        <form id="surveyForm">
          <div>
            <label>
              Pseudonim (opcjonalnie)
              <input type="text" id="participantName" name="participantName" maxlength="80" placeholder="np. tester_01" />
            </label>
          </div>

          <div id="questionContainer" class="question-list"></div>

          <div>
            <label>
              Którą platformę ogólnie oceniasz lepiej?
              <select id="overallPreference" name="overallPreference" required>
                <option value="" selected disabled>Wybierz</option>
                <option value="gmail">Gmail</option>
                <option value="outlook">Outlook</option>
                <option value="remis">Remis</option>
              </select>
            </label>
          </div>

          <button type="submit" id="submitButton">Zapisz odpowiedzi</button>
          <p id="submitStatus" class="status" aria-live="polite"></p>
        </form>
      </section>
      <div id="modeBanner" class="mode-banner"></div>
    </section>

    <!-- Analysis tab -->
    <section id="tab-analysis" class="tab-content">
      <section class="card">
        <h2>Analiza wyników</h2>
        <p class="muted" id="analysisStatus">Ładowanie danych z bazy...</p>

        <div id="statsContainer" class="stats" style="display:none;"></div>

        <h3>Porównanie średnich ocen</h3>
        <div class="chart-card">
          <canvas id="chartComparison"></canvas>
        </div>

        <h3>Średnie ocen per pytanie</h3>
        <div class="chart-grid">
          <div class="chart-card"><canvas id="chartQ1"></canvas></div>
          <div class="chart-card"><canvas id="chartQ2"></canvas></div>
          <div class="chart-card"><canvas id="chartQ3"></canvas></div>
          <div class="chart-card"><canvas id="chartQ4"></canvas></div>
          <div class="chart-card"><canvas id="chartQ5"></canvas></div>
          <div class="chart-card"><canvas id="chartQ6"></canvas></div>
          <div class="chart-card"><canvas id="chartQ7"></canvas></div>
          <div class="chart-card"><canvas id="chartQ8"></canvas></div>
        </div>

        <h3>Preferencja końcowa</h3>
        <div class="chart-grid-2x4">
          <div class="grid-two">
            <div class="chart-card"><canvas id="chartPrefBar"></canvas></div>
            <div class="chart-card"><canvas id="chartPrefPie"></canvas></div>
          </div>
        </div>
      </section>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
